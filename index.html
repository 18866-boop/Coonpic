<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts for elegant aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Photographer Portfolio</title>
  </head>
  <body>
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <!-- Ambient Background Glow -->
    <div class="ambient-glow"></div>

    <!-- Foreground UI content -->
    <main class="content" id="intro-content">
      <header>
        <div class="logo">Lens & Light</div>
        <nav>
          <a href="#">Portfolio</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </nav>
      </header>

      <section class="hero-split">
        <div class="hero-text">
          <p class="subtitle">M.6 Student & Photographer</p>
          <h1 class="title">เก็บความทรงจำ<br>ก่อนจบ ม.6</h1>
          <p class="hero-desc">ภาพถ่ายทุกใบคือเรื่องราวและช่วงเวลาดีๆ กับเพื่อนๆ ที่อยากเก็บไว้เป็นความทรงจำตลอดไป</p>
          <div class="cta-container">
            <a href="/gallery.html" class="cta-button" id="view-gallery-btn">เปิดดูรูป (Open Yearbook)</a>
          </div>
        </div>
        <div class="hero-image">
          <img src="/profile.jpg" alt="Coon - Photographer" />
        </div>
      </section>

      <footer>
        <p>&copy; 2026 Photography Portfolio. All rights reserved.</p>
        <div class="socials">
          <a href="#">Instagram</a>
          <a href="#">Twitter</a>
        </div>
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
